server:
  port: 8083

spring:
  application:
    name: payment-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/airline-realm
          jwk-set-uri: http://airline-keycloak:8080/realms/airline-realm/protocol/openid-connect/certs

  datasource:
    url: jdbc:mysql://localhost:3306/payment_service_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: payment-processor-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: com.airlinemanagementsystem.booking.dto.PaymentRequestDto:com.airlinemanagementsystem.payment.dto.PaymentRequestDto,com.airlinemanagementsystem.payment.dto.PaymentVerificationRequest:com.airlinemanagementsystem.payment.dto.PaymentVerificationRequest

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ID}
    password: ${EMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

razorpay:
  key:
    id: ${RAZORPAY_API_KEY}
    secret: ${RAZORPAY_API_SECRET}